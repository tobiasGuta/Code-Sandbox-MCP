name: test-and-security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 8 * * 1"

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m pytest -q
      - run: python -m ruff check .
      - run: python -m pyright src tests
      - run: python -m pip_audit --local --skip-editable --vulnerability-service osv

  windows-lock:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - run: python -m pip install --require-hashes -r pylock.toml
      - run: python -m pip install -e . --no-deps --no-build-isolation
      - run: python -m pytest -q

  sandbox-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build pinned sandbox image
        run: docker build --pull -t code-sandbox-mcp-javascript:1.0.0 -f containers/Dockerfile.nodejs .
      - name: Scan image and fail on high or critical vulnerabilities
        # v0.35.0 known-safe commit published after GHSA-69fq-xp46-6x23.
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: code-sandbox-mcp-javascript:1.0.0
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: "1"
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          image: code-sandbox-mcp-javascript:1.0.0
          format: cyclonedx-json
          output-file: sandbox-image.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sandbox-image-sbom
          path: sandbox-image.cdx.json
          if-no-files-found: error
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e '.[dev]'
      - name: Docker integration tests
        env:
          RUN_DOCKER_TESTS: "1"
        run: python -m pytest -q tests/test_docker_integration.py
